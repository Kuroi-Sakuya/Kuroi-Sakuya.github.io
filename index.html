<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建设中 · Kuroi-Sakuya</title>
  <link rel="icon" href="/memorial/img/favicon.png">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f7f8; color: #222; text-align: center; padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #16171a; color: #e6e6e6; }
      a.memorial { color: #9db4ff; }
    }
    h1 { font-size: 1.6rem; font-weight: 600; margin: 0 0 .6rem; }
    p { margin: .4rem 0; color: #888; line-height: 1.7; }
    a.memorial {
      display: inline-block; margin-top: 1.4rem; padding: .55rem 1.2rem;
      border: 1px solid currentColor; border-radius: 999px;
      text-decoration: none; color: #3b5bdb; font-size: .9rem;
      transition: opacity .2s;
    }
    a.memorial:hover { opacity: .65; }
    .footer { margin-top: 2.5rem; font-size: .8rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>新博客建设中 🚧</h1>
  <p>这里很快会有新的内容。</p>
  <a class="memorial" href="/memorial/">前往「你也喜欢小鱼吗」纪念站 →</a>
  <p class="footer">© Kuroi-Sakuya</p>
</body>
</html>
