# ===== 站点基本信息（这几项最常改）=====
baseURL: https://kuroi-sakuya.github.io/
languageCode: zh-cn
theme: hugo-theme-stack
title: 互联网冷冻小面包          # ← 站点标题
copyright: 互联网冷冻小面包      # ← 页脚版权署名

DefaultContentLanguage: zh-cn
hasCJKLanguage: true           # 中文分词/字数统计需要

services:
    disqus:
        shortname:
    googleAnalytics:
        id:

pagination:
    pagerSize: 5

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: /favicon.png

    footer:
        since: 2026
        customText: 二象无常，遇而无往

    dateFormat:
        published: 2006-01-02
        lastUpdated: 2006-01-02 15:04 MST

    # ===== 侧边栏（标题下的小字 / 头像）=====
    sidebar:
        emoji: 🌙
        subtitle: 普通的美少女 · INFJ 研究生    # ← 侧边栏副标题
        avatar:
            enabled: true
            local: false
            # 默认用你的 GitHub 头像；想用本地图就把 local 设为 true，
            # 把图片放到 assets/img/avatar.png 并把 src 改成 img/avatar.png
            src: https://avatars.githubusercontent.com/u/62644557?v=4

    article:
        math: false
        toc: true
        readingTime: true
        license:
            enabled: false
            default: Licensed under CC BY-NC-SA 4.0

    # 留言板：自托管 Waline（在你的 VPS）。
    # 拿到地址后：填 serverURL、把 enabled 改成 true 即可上线。
    comments:
        enabled: true
        provider: waline
        waline:
            serverURL: https://kuroi-sakuya.duckdns.org
            lang: zh-CN
            requiredMeta:         # 只要昵称 → 匿名留言（邮箱可选）
                - nick

    # 邮件订阅（Newsletter）：自托管 Listmonk（在你的 VPS）。
    # 上线步骤：① 在 VPS 起好 Listmonk ② 建一个「双重确认」列表，复制其 UUID
    #          ③ 把 serverURL 填成 Listmonk 地址、listUUID 填列表 UUID
    #          ④ enabled 改成 true → 部署
    # 组件只在「有留言板」的页面、且 enabled+serverURL+listUUID 都齐全时才显示。
    newsletter:
        enabled: false
        serverURL: ""             # 例：https://news.kuroi-sakuya.duckdns.org（结尾不要加 /）
        listUUID: ""              # Listmonk 列表的 UUID

    # 全站单栏：不渲染右侧栏小工具（首页用自定义模块，文章页不放目录）
    widgets:
        homepage: []
        page: []

    opengraph:
        twitter:
            site:
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        toggle: true
        default: auto      # 自动跟随系统明暗

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

# ===== 顶部 Banner 导航（仅这 4 项；搜索是 banner 右侧图标，不在此列）=====
menu:
    main:
        - identifier: home
          name: 主页
          url: /
          weight: 1
          params:
              icon: home
        - identifier: categories
          name: 分类
          url: /categories/
          weight: 2
          params:
              icon: categories
        - identifier: timeline
          name: Timeline
          url: /archives/
          weight: 3
          params:
              icon: clock
        - identifier: about
          name: About
          url: /about/
          weight: 4
          params:
              icon: user
    social:
        - identifier: github
          name: GitHub
          url: https://github.com/Kuroi-Sakuya
          params:
              icon: brand-github

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100
        - name: categories
          weight: 200

markup:
    goldmark:
        renderer:
            unsafe: true        # 允许 Markdown 里写 HTML
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
