{{/* 文章底部·分享：复制链接 + 微博 + X + Telegram。
     纯链接、无第三方脚本、无追踪——点了才跳转，符合全站隐私友好基调。
     href 是服务端渲染的兜底（无 JS 也能用）；custom.ts 会在点击时用
     页面真实 location.href + 标题重建链接，确保参数一定带上（见 6) shareLinks）。
     胶囊样式沿用底部标签的「描边胶囊」语汇，保持一致。 */}}
<div class="article-share">
    <span class="article-share__label">
        <svg class="article-share__icon" viewBox="0 0 24 24" width="18" height="18"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="6" r="3"></circle>
            <circle cx="18" cy="18" r="3"></circle>
            <path d="M8.7 10.7l6.6 -3.4"></path>
            <path d="M8.7 13.3l6.6 3.4"></path>
        </svg>
        分享这篇
    </span>
    <div class="article-share__btns">
        <button type="button" class="share-btn share-btn--copy" data-share-url="{{ .Permalink }}">复制链接</button>
        <a class="share-btn" target="_blank" rel="noopener noreferrer"
           data-share="weibo" data-share-url="{{ .Permalink }}" data-share-title="{{ .Title }}"
           href="https://service.weibo.com/share/share.php?{{ (querify "url" .Permalink "title" .Title) }}">微博</a>
        <a class="share-btn" target="_blank" rel="noopener noreferrer"
           data-share="x" data-share-url="{{ .Permalink }}" data-share-title="{{ .Title }}"
           href="https://twitter.com/intent/tweet?{{ (querify "text" .Title "url" .Permalink) }}">X</a>
        <a class="share-btn" target="_blank" rel="noopener noreferrer"
           data-share="telegram" data-share-url="{{ .Permalink }}" data-share-title="{{ .Title }}"
           href="https://t.me/share/url?{{ (querify "url" .Permalink "text" .Title) }}">Telegram</a>
    </div>
</div>
